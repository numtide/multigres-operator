name: Release tag

on:
  push:
    tags:
      - '**'
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "::error::Tag must point to a commit on the main branch"
            exit 1
          fi

      - name: Find latest build for this tag
        id: find-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Finding the latest successful 'Build main' run that is an ancestor of ${{ github.sha }}..."

          # Get the 10 most recent successful runs of main.yaml
          RUNS=$(gh run list \
            --workflow main.yaml \
            --status success \
            --branch main \
            --limit 10 \
            --json headSha \
            --jq '.[].headSha')

          BUILD_SHA=""
          for SHA in $RUNS; do
            if git merge-base --is-ancestor "$SHA" "${{ github.sha }}"; then
              BUILD_SHA="$SHA"
              break
            fi
          done

          if [ -z "$BUILD_SHA" ]; then
            echo "::error::No successful Build main run found that is an ancestor of ${{ github.sha }}"
            exit 1
          fi

          echo "Found build SHA: $BUILD_SHA"
          echo "build_sha=$BUILD_SHA" >> "$GITHUB_OUTPUT"

      - name: Log into registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Retag existing image with version
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          BUILD_SHA="${{ steps.find-build.outputs.build_sha }}"
          VERSION_TAG="${{ github.ref_name }}"

          echo "Retagging $IMAGE:$BUILD_SHA → $IMAGE:$VERSION_TAG"
          docker buildx imagetools create \
            --tag "$IMAGE:$VERSION_TAG" \
            "$IMAGE:$BUILD_SHA"

      - name: Install Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Generate install manifests
        run: |
          make build-installer \
            IMG="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            dist/install.yaml \
            dist/install-certmanager.yaml \
            dist/install-observability.yaml
