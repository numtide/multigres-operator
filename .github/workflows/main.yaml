name: Build main

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/_reusable-build-changed.yaml

  run:
    uses: ./.github/workflows/build-and-release.yaml
    with:
      push-container-image: true
      additional-tags: "current latest"
      generate-manifests: true
      manifest-image-ref: "ghcr.io/${{ github.repository }}:${{ github.sha }}"

  update-current-release:
    needs: run
    runs-on: ubuntu-latest
    concurrency:
      group: current-release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Download install manifests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: install-manifests
          path: dist

      - name: Create or update current pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          BODY="## Current Build

          **Commit:** \`${{ github.sha }}\`
          **Updated:** \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`

          This is a rolling pre-release that tracks the latest successful build from \`main\`.
          Install manifests below use the SHA-tagged container image for this commit.

          ### Quick Install

          \`\`\`
          curl -LO https://github.com/${{ github.repository }}/releases/download/current/install.yaml
          kubectl apply -f install.yaml
          \`\`\`"

          # Delete existing release and tag, then recreate pointing at the new
          # commit. This is the standard pattern used by neovim, goreleaser, etc.
          # for rolling prereleases. The brief gap between delete and create is
          # acceptable — if create fails, the next main push recreates it.
          gh release delete current --yes --cleanup-tag 2>/dev/null || true

          gh release create current \
            --prerelease \
            --title "Current (latest main)" \
            --notes "$BODY" \
            --target "${{ github.sha }}" \
            dist/install*.yaml

  coverage:
    name: Coverage
    permissions:
      contents: read
    uses: ./.github/workflows/_reusable-test-coverage.yaml
    with:
      COVERAGE_THRESHOLD: 70

  e2e-build:
    name: E2E build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build operator image
        run: make container
      - name: Save operator image
        run: docker save $(make -s print-img) -o /tmp/operator-image.tar
      - name: Upload operator image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: operator-image
          path: /tmp/operator-image.tar
          retention-days: 1

  e2e:
    name: "E2E (${{ matrix.test }})"
    needs: e2e-build
    strategy:
      fail-fast: false
      matrix:
        test: [minimal, inline, templated, deletion]
    permissions:
      contents: read
    uses: ./.github/workflows/_reusable-e2e.yaml
    with:
      test-spec: ${{ matrix.test }}
      mode: shared
      operator-image-artifact: operator-image
