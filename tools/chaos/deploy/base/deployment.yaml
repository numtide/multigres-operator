apiVersion: apps/v1
kind: Deployment
metadata:
  name: multigres-chaos
  namespace: multigres-operator
  labels:
    app.kubernetes.io/name: multigres-chaos
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: multigres-chaos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multigres-chaos
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: multigres-chaos
          image: chaos:latest
          imagePullPolicy: IfNotPresent
          args:
            - --level=0
            - --metrics-addr=:9090
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
      serviceAccountName: multigres-chaos
      terminationGracePeriodSeconds: 10
