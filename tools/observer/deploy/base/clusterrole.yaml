apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: multigres-observer
    app.kubernetes.io/managed-by: kustomize
  name: multigres-observer
rules:
  # Core resources: read-only for observation
  - apiGroups: [""]
    resources: [pods, pods/log, services, endpoints, persistentvolumeclaims, configmaps, secrets, events, namespaces]
    verbs: [get, list, watch]
  # Apps resources: read-only
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets]
    verbs: [get, list, watch]
  # Policy resources: read-only
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch]
  # Multigres CRDs: read-only
  - apiGroups: [multigres.com]
    resources: ["*"]
    verbs: [get, list, watch]
