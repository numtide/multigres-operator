apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-etcd
  namespace: default
  labels:
    app: external-etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-etcd
  template:
    metadata:
      labels:
        app: external-etcd
    spec:
      containers:
        - name: etcd
          image: "gcr.io/etcd-development/etcd:v3.6.7"
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/etcd
            - "--advertise-client-urls=http://0.0.0.0:2379"
            - "--listen-client-urls=http://0.0.0.0:2379"
          ports:
            - containerPort: 2379
              name: client
---
apiVersion: v1
kind: Service
metadata:
  name: external-etcd-service
  namespace: default
spec:
  selector:
    app: external-etcd
  ports:
    - protocol: TCP
      port: 2379
      targetPort: 2379
