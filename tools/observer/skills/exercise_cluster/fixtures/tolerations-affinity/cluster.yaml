apiVersion: multigres.com/v1alpha1
kind: MultigresCluster
metadata:
  name: tolerations-affinity
  namespace: default
spec:
  pvcDeletionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  cells:
    - name: "us-east-1"
      spec:
        multigateway:
          replicas: 1
  databases:
    - name: "postgres"
      default: true
      tablegroups:
        - name: "default"
          default: true
          shards:
            - name: "0-inf"
              spec:
                multiorch:
                  replicas: 1
                pools:
                  main-rw:
                    type: readWrite
                    cells: ["us-east-1"]
                    replicasPerCell: 4
                    storage:
                      size: "5Gi"
                    tolerations:
                      - key: "test-toleration"
                        operator: "Equal"
                        value: "true"
                        effect: "NoSchedule"
                    affinity:
                      podAntiAffinity:
                        preferredDuringSchedulingIgnoredDuringExecution:
                          - weight: 50
                            podAffinityTerm:
                              labelSelector:
                                matchLabels:
                                  multigres.com/pool: "main-rw"
                              topologyKey: "kubernetes.io/hostname"
