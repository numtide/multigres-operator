apiVersion: multigres.com/v1alpha1
kind: MultigresCluster
metadata:
  name: initdb-args
  namespace: default
spec:
  pvcDeletionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  logLevels:
    pgctld: "debug"
    multipooler: "debug"
    multiorch: "debug"
    multiadmin: "debug"
    multigateway: "debug"
  cells:
    - name: "us-east-1"
      spec:
        multigateway:
          replicas: 1
  databases:
    - name: "postgres"
      default: true
      tablegroups:
        - name: "default"
          default: true
          shards:
            - name: "0-inf"
              spec:
                multiorch:
                  replicas: 1
                initdbArgs: "--locale-provider=icu --icu-locale=en_US.UTF-8"
                pools:
                  main-rw:
                    type: readWrite
                    cells: ["us-east-1"]
                    replicasPerCell: 3
                    storage:
                      size: "5Gi"
