apiVersion: multigres.com/v1alpha1
kind: MultigresCluster
metadata:
  name: pvc-default-policy
  namespace: default
spec:
  # No pvcDeletionPolicy set — verifies new default: whenDeleted=Retain, whenScaled=Delete
  logLevels:
    pgctld: "debug"
    multipooler: "debug"
    multiorch: "debug"
    multiadmin: "debug"
    multigateway: "debug"
  cells:
    - name: "us-east-1"
      spec:
        multigateway:
          replicas: 1
  databases:
    - name: "postgres"
      default: true
      tablegroups:
        - name: "default"
          default: true
          shards:
            - name: "0-inf"
              spec:
                multiorch:
                  replicas: 1
                pools:
                  main-rw:
                    type: readWrite
                    cells: ["us-east-1"]
                    replicasPerCell: 4
                    storage:
                      size: "5Gi"
