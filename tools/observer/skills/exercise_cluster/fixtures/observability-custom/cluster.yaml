apiVersion: multigres.com/v1alpha1
kind: MultigresCluster
metadata:
  name: observability-custom
  namespace: default
spec:
  pvcDeletionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  observability:
    otlpEndpoint: "http://my-otel-collector:4318"
    otlpProtocol: "http/protobuf"
    tracesExporter: "otlp"
    metricsExporter: "otlp"
    logsExporter: "otlp"
    tracesSampler: "multigres_custom"
    samplingConfigRef:
      name: "custom-sampler-config"
  cells:
    - name: "us-east-1"
      spec:
        multigateway:
          replicas: 1
  databases:
    - name: "postgres"
      default: true
      tablegroups:
        - name: "default"
          default: true
          shards:
            - name: "0-inf"
              spec:
                multiorch:
                  replicas: 1
                pools:
                  main-rw:
                    type: readWrite
                    cells: ["us-east-1"]
                    replicasPerCell: 4
                    storage:
                      size: "5Gi"
