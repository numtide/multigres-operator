apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-pg-config
  namespace: default
data:
  postgresql.conf: |
    # Custom PostgreSQL configuration for exerciser testing.
    # pgctld renders this as a Go template — use placeholders like
    # the upstream template.cnf (e.g. shared_buffers = {{.SharedBuffers}}).
    # Plain values without template directives are passed through as-is.

    # Override shared_buffers from the default auto-tuned value
    shared_buffers = '256MB'

    # Override work_mem
    work_mem = '16MB'

    # Override max_connections
    max_connections = 50
