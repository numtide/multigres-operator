apiVersion: multigres.com/v1alpha1
kind: MultigresCluster
metadata:
  name: ext-adminweb
  namespace: default
spec:
  pvcDeletionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  multiadminWeb:
    spec:
      replicas: 1
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
  externalAdminWeb:
    enabled: true
    externalIPs:
      - "198.51.100.10"
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      test.multigres.exerciser/fixture: "external-adminweb"
  logLevels:
    pgctld: "debug"
    multipooler: "debug"
    multiorch: "debug"
    multiadmin: "debug"
    multigateway: "debug"
  cells:
    - name: "us-east-1"
      spec:
        multigateway:
          replicas: 1
  databases:
    - name: "postgres"
      default: true
      tablegroups:
        - name: "default"
          default: true
          shards:
            - name: "0-inf"
              spec:
                multiorch:
                  replicas: 1
                pools:
                  main-rw:
                    type: readWrite
                    cells: ["us-east-1"]
                    replicasPerCell: 2
                    storage:
                      size: "5Gi"
